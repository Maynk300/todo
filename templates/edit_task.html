<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit_task</title>
        <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
   
    <div class="container"></div>
     <h1 class="pt-5 pb-5 text-center">TODO APP - EDIT PAGE</h1>
     <form action="{% url 'edit_task' get_task.pk %}" method="post" style="width: 500px; margin: auto;">
        {% csrf_token %}
        <div class=" form-group">
            <span style="display:flex; gap:10px;">
                <input type="text" class="form-control" placeholder="Add a Task" name="taskkk" value="{{ get_task.task }}">
                <button type="submit" class="btn btn-primary" style="width: 200px;" > Update</button>

            </span>
        </div>
     </form>
</body>
</html>
